name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * *"   # todo dia às 09:00 UTC (06:00 Brasília)

jobs:
  test:
    name: pytest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python from .python-version
        run: uv python install

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -v --cov=src --cov-report=term-missing

  contrato:
    name: contrato CEMADEN
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python from .python-version
        run: uv python install

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run contrato test
        run: uv run pytest -m integration -v